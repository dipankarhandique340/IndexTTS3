[project]
name = "indextts-cpu"
version = "2.0.0-cpu"
description = "IndexTTS2 - CPU/Low-VRAM Optimized Edition"
authors = [{ name = "Bilibili IndexTTS Team" }]
license = "LicenseRef-Bilibili-IndexTTS"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "accelerate>=1.2.0",
  "cn2an==0.5.22",
  "einops>=0.8.1",
  "ffmpeg-python==0.2.0",
  "g2p-en==2.1.0",
  "gradio>=5.0.0",
  "jieba==0.42.1",
  "json5==0.10.0",
  "librosa>=0.10.2",
  "matplotlib>=3.8.0",
  "modelscope>=1.20.0",
  "munch>=4.0.0",
  "numba>=0.58.0",
  "numpy>=1.26.0,<2.0",
  "omegaconf>=2.3.0",
  "pandas>=2.0.0",
  "safetensors>=0.5.0",
  "sentencepiece>=0.2.1",
  "textstat>=0.7.10",
  "tokenizers>=0.21.0",
  "torch>=2.1.0",
  "torchaudio>=2.1.0",
  "tqdm>=4.67.0",
  "transformers>=4.40.0",
  "WeTextProcessing; sys_platform == 'linux'",
  "wetext>=0.0.9; sys_platform != 'linux'",
  "huggingface-hub>=0.20.0",
  "soundfile>=0.12.0",
]

[build-system]
requires = ["hatchling >= 1.27.0"]
build-backend = "hatchling.build"
